<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    /* CSS:START */
    /* CSS:END */
  </style>
</head>

<body>

  <!-- Estado de erro -->
  <div id="error-view"
    style="display:none; flex-direction:column; align-items:center; justify-content:center; height:100%; padding:40px; text-align:center;">
    <div style="font-size:40px; margin-bottom:20px;">⚠️</div>
    <div id="error-message"
      style="color:#ff6666; margin-bottom:20px; font-size:12px; font-family:monospace; word-break:break-all;"></div>
  </div>

  <!-- Compare Mode — view principal do Mirage -->
  <div id="compare" style="display:flex;">

    <!-- Barra de topo: badge beta + selectors A e B -->
    <div id="cm-top">
      <div id="cm-badge"><span>β</span><span>Mirage</span></div>
      <div id="cm-selectors">
        <div id="cm-slot-a" class="cm-slot">
          <div class="cm-slot-label">Componente A</div>
          <div class="cm-slot-value cm-slot-empty">Selecionar…</div>
          <button class="cm-slot-clear ctrl-btn" data-slot="a" title="Limpar">×</button>
        </div>
        <button id="cm-vs" class="btn-icon" title="Trocar A ↔ B">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 6C12.2761 6 12.5 6.22386 12.5 6.5V17.5C12.5 17.7761 12.2761 18 12 18C11.7239 18 11.5 17.7761 11.5 17.5V6.5C11.5 6.22386 11.7239 6 12 6ZM6 9.10352C6.00003 8.47698 6.71042 8.14366 7.18848 8.49414L7.28027 8.57324L10 11.293C10.3905 11.6835 10.3905 12.3165 10 12.707L7.28027 15.4268C6.8078 15.8992 6.00003 15.5646 6 14.8965V9.10352ZM16.8115 8.49414C17.2896 8.14366 18 8.47698 18 9.10352V14.8965C18 15.5646 17.1922 15.8992 16.7197 15.4268L14 12.707C13.6095 12.3165 13.6095 11.6835 14 11.293L16.7197 8.57324L16.8115 8.49414ZM7 14.293L9.29297 12L7 9.70703V14.293ZM14.707 12L17 14.293V9.70703L14.707 12Z" fill="currentColor"/>
          </svg>
        </button>
        <div id="cm-slot-b" class="cm-slot">
          <div class="cm-slot-label">Componente B</div>
          <div class="cm-slot-value cm-slot-empty">Selecionar…</div>
          <button class="cm-slot-clear ctrl-btn" data-slot="b" title="Limpar">×</button>
        </div>
      </div>
      <button id="cm-expand-all" class="btn-icon" title="Expandir tudo">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 9v4h4M13 5V1H9M1 13l5-5M9 5l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button id="cm-reset" class="btn-icon" title="Repor vista">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 1v4H1M9 13v-4h4M1 1l4 4M9 9l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- Barra de filtros (oculta temporariamente)
    <div id="cm-filter">
      <input type="text" id="cm-filter-layer" class="cm-filter-input" placeholder="Filtrar layer…" autocomplete="off" spellcheck="false">
      <input type="text" id="cm-filter-token" class="cm-filter-input" placeholder="Filtrar token…" autocomplete="off" spellcheck="false">
    </div>
    -->

    <!-- Canvas de comparação -->
    <div id="cm-area">
      <div id="cm-empty">
        <div id="cm-empty-icon">◈</div>
        <div id="cm-empty-text">Selecciona dois componentes para começar</div>
      </div>
      <canvas id="cm-canvas"></canvas>
    </div>

    <!-- Legenda -->
    <div id="cm-legend"></div>

  </div>

  <!-- Tooltip CM-I1 -->
  <div id="cm-tooltip" style="display:none;"></div>

  <!-- Resize handles -->
  <div id="cm-resize-handle"        data-resize="se"></div>
  <div id="cm-resize-right"         data-resize="e"></div>
  <div id="cm-resize-bottom"        data-resize="s"></div>
  <div id="cm-resize-left"          data-resize="w"></div>

  <script>
    /* JS:START */
    /* JS:END */
  </script>
</body>

</html>
